name: Deploy Webhook Receiver

on:
  push:
    branches: [main]
    paths:
      - 'apps/webhook-receiver/**'
      - '.github/workflows/deploy-webhook-receiver.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  FUNCTION_NAME: webhookReceiver

jobs:
  deploy:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        working-directory: apps/webhook-receiver
        run: |
          gcloud functions deploy ${{ env.FUNCTION_NAME }} \
            --gen2 \
            --runtime nodejs20 \
            --region ${{ env.GCP_REGION }} \
            --source . \
            --entry-point webhookReceiver \
            --trigger-http \
            --allow-unauthenticated \
            --set-env-vars FIRESTORE_PROJECT_ID=${{ secrets.FIRESTORE_PROJECT_ID }} \
            --set-env-vars AGENT_BUILDER_PROJECT=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars AGENT_BUILDER_LOCATION=${{ env.GCP_REGION }} \
            --set-env-vars AGENT_BUILDER_AGENT_ID=${{ secrets.AGENT_BUILDER_AGENT_ID }} \
            --quiet

      - name: Get Function URL
        id: function-url
        run: |
          URL=$(gcloud functions describe ${{ env.FUNCTION_NAME }} \
            --gen2 \
            --region ${{ env.GCP_REGION }} \
            --format 'value(serviceConfig.uri)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### 🎯 Webhook Receiver Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "Webhook URL: $URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configure this URL in Dynatrace webhook settings" >> $GITHUB_STEP_SUMMARY
